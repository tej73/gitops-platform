apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-backend
  namespace: gitops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-backend
  template:
    metadata:
      labels:
        app: gitops-backend
    spec:
      containers:
      - name: backend
        image: gitops-project-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-backend-service
  namespace: gitops
spec:
  selector:
    app: gitops-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort
